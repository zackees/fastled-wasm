name: Build

on:
  workflow_call:
    inputs:
      runs-on:
        required: true
        type: string
      maturin-target:
        required: false
        type: string
        default: ""

jobs:
  build:
    runs-on: ${{ inputs.runs-on }}
    timeout-minutes: 30
    defaults:
      run:
        shell: bash
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: sccache
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - uses: mozilla-actions/sccache-action@v0.0.9

      - uses: zackees/setup-soldr@v0
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          cache: true
          # Include github.workflow because some callers (e.g. Windows
          # x86/ARM) currently share the same runs-on. Without this they
          # collide on the same cache key and one job fails to save.
          cache-key-suffix: build-${{ inputs.runs-on }}-${{ github.workflow }}

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install
        run: ./install

      - name: Add cross-compile target
        if: inputs.maturin-target != ''
        run: rustup target add "${{ inputs.maturin-target }}"

      - name: Build fastled CLI binary (for wheel bundling)
        run: |
          # Compile the Rust `fastled` CLI and stage it under wheel-data/scripts/
          # so maturin packages it into <pkg>-<ver>.data/scripts/ in the wheel.
          # See `build-wheel` and `[tool.maturin] data` in pyproject.toml.
          if [ -n "${{ inputs.maturin-target }}" ]; then
            soldr cargo build --release --bin fastled --target "${{ inputs.maturin-target }}"
            case "${{ inputs.maturin-target }}" in
              *windows*) EXE_NAME="fastled.exe" ;;
              *)         EXE_NAME="fastled" ;;
            esac
            BIN_SRC="target/${{ inputs.maturin-target }}/release/${EXE_NAME}"
          else
            soldr cargo build --release --bin fastled
            case "$(uname -s)" in
              MINGW*|MSYS*|CYGWIN*) EXE_NAME="fastled.exe" ;;
              *)                    EXE_NAME="fastled" ;;
            esac
            # On Windows the rustup default host triple is MSVC; cargo writes
            # the binary under target/<triple>/release/ even without --target.
            if [ -n "${CARGO_BUILD_TARGET:-}" ] || [ "$EXE_NAME" = "fastled.exe" ]; then
              ARCH="$(uname -m)"
              if [ "$ARCH" = "x86_64" ]; then TRIPLE="x86_64-pc-windows-msvc"; else TRIPLE="aarch64-pc-windows-msvc"; fi
              if [ -f "target/${TRIPLE}/release/${EXE_NAME}" ]; then
                BIN_SRC="target/${TRIPLE}/release/${EXE_NAME}"
              else
                BIN_SRC="target/release/${EXE_NAME}"
              fi
            else
              BIN_SRC="target/release/${EXE_NAME}"
            fi
          fi
          mkdir -p wheel-data/scripts
          cp -f "$BIN_SRC" "wheel-data/scripts/${EXE_NAME}"
          ls -lh wheel-data/scripts/

      - name: Build wheel
        run: |
          if [ -n "${{ inputs.maturin-target }}" ]; then
            # Generate import lib stub for cross-compilation.
            # PyO3 abi3-py310 expects python310.lib but generate-import-lib
            # creates python3.lib; copy to satisfy the linker.
            BUILD_DIR="target/${{ inputs.maturin-target }}/release/build"
            uv run maturin build --release --target "${{ inputs.maturin-target }}" || {
              echo "First build failed — patching import lib name..."
              for d in "$BUILD_DIR"/pyo3-ffi-*/out/lib; do
                if [ -f "$d/python3.lib" ] && [ ! -f "$d/python310.lib" ]; then
                  cp "$d/python3.lib" "$d/python310.lib"
                  echo "Copied python3.lib -> python310.lib in $d"
                fi
              done
              uv run maturin build --release --target "${{ inputs.maturin-target }}"
            }
          else
            uv run maturin build --release
          fi

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ inputs.runs-on }}-${{ inputs.maturin-target || 'native' }}
          path: target/wheels/*.whl

      - name: Upload failure logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-logs-build-${{ inputs.runs-on }}
          path: logs/*
          if-no-files-found: warn
