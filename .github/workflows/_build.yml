name: Build

on:
  workflow_call:
    inputs:
      runs-on:
        required: true
        type: string
      maturin-target:
        required: false
        type: string
        default: ""

jobs:
  build:
    runs-on: ${{ inputs.runs-on }}
    timeout-minutes: 30
    defaults:
      run:
        shell: bash
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: sccache
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - uses: mozilla-actions/sccache-action@v0.0.9

      - name: Set Rust toolchain
        run: |
          CHANNEL=$(grep 'channel' rust-toolchain.toml | head -1 | sed 's/.*= *"\(.*\)"/\1/')
          echo "RUSTUP_TOOLCHAIN=$CHANNEL" >> "$GITHUB_ENV"

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: fastled-${{ inputs.runs-on }}
          cache-targets: false

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install
        run: ./install

      - name: Add cross-compile target
        if: inputs.maturin-target != ''
        run: rustup target add "${{ inputs.maturin-target }}"

      - name: Build wheel
        run: |
          if [ -n "${{ inputs.maturin-target }}" ]; then
            # Generate import lib stub for cross-compilation.
            # PyO3 abi3-py310 expects python310.lib but generate-import-lib
            # creates python3.lib; copy to satisfy the linker.
            BUILD_DIR="target/${{ inputs.maturin-target }}/release/build"
            uv run maturin build --release --target "${{ inputs.maturin-target }}" || {
              echo "First build failed — patching import lib name..."
              for d in "$BUILD_DIR"/pyo3-ffi-*/out/lib; do
                if [ -f "$d/python3.lib" ] && [ ! -f "$d/python310.lib" ]; then
                  cp "$d/python3.lib" "$d/python310.lib"
                  echo "Copied python3.lib -> python310.lib in $d"
                fi
              done
              uv run maturin build --release --target "${{ inputs.maturin-target }}"
            }
          else
            uv run maturin build --release
          fi

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ inputs.runs-on }}-${{ inputs.maturin-target || 'native' }}
          path: target/wheels/*.whl

      - name: Upload failure logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-logs-build-${{ inputs.runs-on }}
          path: logs/*
          if-no-files-found: warn
