name: Unit Test

on:
  workflow_call:
    inputs:
      runs-on:
        required: true
        type: string

jobs:
  unit-test:
    runs-on: ${{ inputs.runs-on }}
    timeout-minutes: 30
    defaults:
      run:
        shell: bash
    env:
      PYTHONIOENCODING: utf-8
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - uses: zackees/setup-soldr@v0
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          cache: true
          # Include github.workflow because some callers (e.g. Windows
          # x86/ARM) currently share the same runs-on. Without this they
          # collide on the same cache key and one job fails to save.
          cache-key-suffix: unit-test-${{ inputs.runs-on }}-${{ github.workflow }}

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install
        run: ./install

      - name: Unit Tests
        run: ./test

      - name: Upload failure logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-logs-unit-test-${{ inputs.runs-on }}
          path: logs/*
          if-no-files-found: warn
