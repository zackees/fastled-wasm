name: Lint

on:
  workflow_call:
    inputs:
      runs-on:
        required: true
        type: string

jobs:
  lint:
    runs-on: ${{ inputs.runs-on }}
    timeout-minutes: 30
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.11.9"

      - name: Install Python
        run: uv python install "$UV_PYTHON"

      - uses: zackees/setup-soldr@v0.9.62
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          # No soldr version pin: keep in lockstep with _build.yml so all jobs
          # resolve the same soldr/zccache version and share warm caches
          # (see the pin rationale comment in _build.yml and #158).
          # cache-preset: foundation expands to build-cache: true +
          # target-cache: false + cargo-registry-cache: false +
          # prebuild-deps: soldr-cook (setup-soldr v0.9.17+, #251).
          cache-preset: foundation
          # "-native" matches _build.yml's native-target suffix so lint, test,
          # and native build jobs on the same runner share one cache namespace.
          cache-key-suffix: ${{ inputs.runs-on }}-native
          linker: platform-default
          toolchain-file: rust-toolchain.toml
          # `./lint` runs `soldr cargo clippy --workspace --all-targets`
          # (dev/debug profile). Cook in debug so its prebuilt deps share the
          # compile-cache key with the clippy compile; the default `--release`
          # cook is zero-reuse here and only bloats the build-cache
          # (setup-soldr#235).
          prebuild-deps-flags: ""

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Sync Python deps
        run: uv sync --group dev

      # Installing the dylint nightly toolchain and building cargo-dylint /
      # dylint-link from source is the dominant fixed cost of every lint job
      # (10+ min per platform). Cache them keyed on the exact versions; bump
      # the key when either version below changes (#170).
      - name: Cache Dylint toolchain and tools
        id: dylint-cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.rustup/toolchains/nightly-2026-03-26-*
            ~/.cargo/bin/cargo-dylint*
            ~/.cargo/bin/dylint-link*
            ~/.dylint_drivers
          key: dylint-${{ runner.os }}-${{ runner.arch }}-6.0.1-nightly-2026-03-26

      - name: Install Dylint
        if: steps.dylint-cache.outputs.cache-hit != 'true'
        run: |
          # The dylint nightly is not declared in rust-toolchain.toml (which
          # setup-soldr already installs via `soldr toolchain ensure`), so
          # install it through soldr's rustup passthrough rather than bare
          # rustup, keeping soldr-managed toolchain homes consistent.
          soldr rustup toolchain install nightly-2026-03-26 --profile minimal --component llvm-tools-preview,rust-src,rustc-dev
          soldr cargo install cargo-dylint --version 6.0.1 --locked --force
          soldr cargo install dylint-link --version 6.0.1 --locked --force

      - name: Lint
        run: ./lint

      - name: Upload failure logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-logs-lint-${{ inputs.runs-on }}
          path: logs/*
          if-no-files-found: warn
