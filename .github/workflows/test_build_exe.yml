name: Test Build Executables

on: [push]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [
            ubuntu-24.04,  # linux/amd64
            windows-latest,  # x64
            macos-latest,  # arm64
            macos-14  # x86
        ]
        python-version: [3.11]
    
    steps:
    - uses: actions/checkout@v5

    - uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install UV
      run: pip install uv

    - name: Install dependencies
      run: ./install
      shell: bash

    - name: Build executable
      run: uv run build_exe.py

    - name: Test executable
      shell: bash
      run: |
        if [ "${{ matrix.os }}" = "windows-latest" ]; then
          ./dist/fastled.exe --version
        else
          ./dist/fastled --version
        fi

    - name: Smoke test HTTPS server from executable
      if: matrix.os == 'ubuntu-24.04'
      shell: bash
      run: |
        set -euo pipefail

        mkdir -p smoke_site
        printf '<!doctype html><html><body>ok</body></html>\n' > smoke_site/index.html

        export BROWSER=/bin/true
        ./dist/fastled --serve-dir smoke_site > smoke.log 2>&1 &
        pid=$!

        cleanup() {
          if kill -0 "$pid" 2>/dev/null; then
            kill "$pid" 2>/dev/null || true
            wait "$pid" 2>/dev/null || true
          fi
        }
        trap cleanup EXIT

        for _ in $(seq 1 180); do
          if ! kill -0 "$pid" 2>/dev/null; then
            echo "Executable exited before HTTPS server became ready."
            tail -n 200 smoke.log || true
            exit 1
          fi

          for port in $(seq 8089 8289); do
            if curl -ksSf "https://127.0.0.1:${port}/" >/dev/null; then
              echo "HTTPS smoke test passed on port ${port}."
              exit 0
            fi
          done

          sleep 1
        done

        echo "Timed out waiting for HTTPS server from executable."
        tail -n 200 smoke.log || true
        exit 1
      
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: fastled-${{ matrix.os }}
        path: |
          dist/fastled
          dist/fastled.exe
